[theme]
# 1. 메인 포인트 컬러 (활력과 건강을 상징하는 밝은 민트 그린)
# 적용 위치: 클릭된 버튼, 체크박스, 프로그레스 바 등
primaryColor = "#00C28A"

# 2. 메인 배경색 (모던하고 깔끔한 연한 회백색)
backgroundColor = "#F8FAFC"

# 3. 보조 배경색 (입력창, 사이드바, 박스 등을 분리해주는 순백색)
secondaryBackgroundColor = "#FFFFFF"

# 4. 텍스트 색상 (완전한 검은색보다 가독성이 좋고 고급스러운 짙은 슬레이트 그레이)
textColor = "#1E293B"

# 5. 기본 폰트 (군더더기 없는 모던 폰트)
font = "sans serif"